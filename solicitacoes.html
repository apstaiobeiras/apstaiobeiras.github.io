      </style><meta content="lua-wpp" name="generator"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/><link rel="stylesheet" href="assets/css/style.css"/></head><body class="container-lg px-3 my-5 markdown-body"><div class="navbar"><a><span id="codigo_profissional">0000</span> - <span id="profissional">Todos os profissionais</span></a></div><h3>Solicitações excluidas - Ano 2023 - Total <span id="total">0</span></h3><h5>Atualizado em <span id="atualizacao"/></h5><div><label>Do dia: <input id="data_inicial" max="2023-12-31" value="2023-01-01" type="date" min="2023-01-01"/></label> <label> até o dia <input id="data_final" max="2023-12-31" value="2023-12-31" type="date" min="2023-01-01"/></label><span id="de"> de </span><select id="unidade" style="max-width: 300px !important;"></select><span id="feitas-por"> feitas por </span><select id="lista-profissional" style="max-width: 300px !important;"></select> <button onclick="filtra()">Filtrar</button><div id="x" v="false"/></div><br/><table><tbody id="solicitacoes"></tbody></table><br/></body><script src="js/solicitacoes_excluidas.js"></script><script src="js/lista_profissionais_solicitacoes.js"></script><script src="js/lista_unidades_solicitacoes.js"></script><script>        var x = 2;

        filtra = () => {
            const data_inicial = parseInt(document.getElementById('data_inicial').value.replaceAll('-',''));
            const data_final = parseInt(document.getElementById('data_final').value.replaceAll('-',''));

            document.getElementById("solicitacoes").innerHTML = "<tr><th>Nº Solititação</th><th>Prontuário</th><th>Procedimento</th><th class='left'>Motivo/Observação</th></tr>";
    
            let unidade = document.getElementById("unidade").value;
            let profissional = document.getElementById("lista-profissional").value;

            if ((new URLSearchParams(window.location.search)).get('cod') && (new URLSearchParams(window.location.search)).get('mode') == null) {
                profissional = parseInt((new URLSearchParams(window.location.search)).get('cod'), 36);
                document.getElementById("lista-profissional").value = profissional;
                document.getElementById("codigo_profissional").textContent = profissional;

                document.getElementById("profissional").textContent = document.getElementById("lista-profissional").options[document.getElementById("lista-profissional").selectedIndex].text

                document.getElementById("unidade").style.display = "none";
                document.getElementById("lista-profissional").style.display = "none";
                document.getElementById("de").style.display = "none";
                document.getElementById("feitas-por").style.display = "none";
            }

            const unidades = [unidade];

            if ((new URLSearchParams(window.location.search)).get('mode')) {
                let modo = (new URLSearchParams(window.location.search)).get('mode');

                if (modo=="r1") {
                    document.getElementById("de").style.display = "none";
                    document.getElementById("unidade").style.display = "none";

                    unidades.pop();
                    unidade = "x";

                    let unidade_parametro = (new URLSearchParams(window.location.search)).get('unidade');
                    document.getElementById("profissional").textContent = unidade_parametro;
                    document.getElementById("codigo_profissional").textContent = profissional;

                    for (option of document.getElementById("unidade").children) {
                        let valor = option.value;
                        let nome = option.textContent.replace("ED.","EDUCADOR")
                                                     .replace("FIS.","FISICO")
                                                     .replace("ENFERMARIA MARY ","ENFERMEIRA MARY ")
                                                     .replace("MARY TATIANE ANTONIO","MARY TATIANE ANTUNES LOPES");
                        console.log(nome);

                        if (nome.startsWith(unidade_parametro)) {
                            unidades.push(valor);
                        }
                    }
                }
            }

            let x = 1;
            for (var i = 0; i < Solicitacoes_Excluidas.length; i++) {
                const solicitacao = Solicitacoes_Excluidas[i];
                const data_solicitacao = parseInt(solicitacao[5]);
    
                if (data_solicitacao>data_final||data_solicitacao<data_inicial) continue;

                if (unidade != "" && unidade != solicitacao[3] && unidade != "x") continue;
                if (profissional != "" && solicitacao[1] != profissional) continue;

                if (!unidades.includes(solicitacao[3]) && unidade == "x") continue;


                const linha = document.createElement("tr");
    
                const no_solicitacao = document.createElement("td");
                const prontuario = document.createElement("td");
                const procedimento = document.createElement("td");
                const observacao = document.createElement("td");
    
                no_solicitacao.innerHTML = `<a href="https://www.taiobeiras-mg.vivver.com/amb/solicitacao/solicitacao_procedimento_servico/${solicitacao[0]}" target="_blank">${solicitacao[0]}</a>`;
                prontuario.innerHTML = `${solicitacao[2]}`;
                observacao.innerHTML = `${solicitacao[4]}`;
                observacao.classList = "left";

                procedimento.innerHTML = `${solicitacao[6]}`;
                procedimento.classList = "left";
    
                linha.appendChild(no_solicitacao);
                linha.appendChild(prontuario);
                linha.appendChild(procedimento);
                linha.appendChild(observacao);
    
                document.getElementById("solicitacoes").appendChild(linha);
                document.getElementById("total").textContent = x;

                x+=1;
            }
        }

        document.getElementById("unidade").innerHTML = lista_unidades_solicitacoes;
        document.getElementById("lista-profissional").innerHTML = lista_profissionais_solicitacoes;

        const params = new URLSearchParams(window.location.search);
        if (params.has('profissional')) {
            document.getElementById("codigo_profissional").textContent = params.get('profissional');
            document.getElementById("profissional").textContent = lista_profissionais[params.get('profissional')];
        }

        //?profissional=1137
        filtra();
    </script></html>
