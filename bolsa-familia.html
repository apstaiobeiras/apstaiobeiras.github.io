      </style><meta content="lua-wpp" name="generator"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/><link href="assets/css/style.css" rel="stylesheet"/></head><body class="container-lg px-3 my-5 markdown-body"><div class="navbar"><a>Bolsa Família</a></div><h3></h3><table id="busca"><tr><td>Acompanhar pelo NIS: </td><td><input id="nis"/></td><td><button onclick="acompanhar()">Carregar família</button></td></tr><tr><td>Acompanhar pelo CNS: </td><td><input id="cns"/></td><td><button onclick="procurar(5,'cns')">Procurar</button></td></tr><tr><td>Acompanhar pelo Cód ACS: </td><td><input id="cod"/></td><td><button onclick="procurar(4,'cod')">Procurar</button></td></tr><tr><td>Acompanhar pela data de nascimento: </td><td><input id="dn" type="date"/></td><td><button onclick="procurar(4,'dn')">Procurar</button></td></tr></table><h3></h3><div><table style="overflow: hidden"><tbody id="dados_familia"></tbody></table><br/></div><button class="oculto" id="cancelar" onclick="cancelar()">Cancelar acompanhamento</button> <button class="oculto" id="salvar" onclick="salvar()">Salvar acompanhamento</button></body><script src="js/listaNIS.js"></script><script src="js/nis2familia.js"></script><script>        document.body.classList.remove('container-lg');

        function cancelar(){
            document.getElementById("cancelar").classList = "oculto";
            document.getElementById("salvar").classList = "oculto";
            document.getElementById("busca").classList = "";

            document.getElementById("dados_familia").innerHTML = "";

        }

        function iniciarAcompanhamento(linha) {
            document.getElementById("busca").classList = "oculto";
            document.getElementById(linha).children[3].remove();

            document.getElementById(linha).innerHTML += `
              <td><input style="max-width: 64px"></td>
              <td><input style="max-width: 64px"></td>
              <td><input type="date"></td>
            `;

            return false;
        }

        

        function procurar(indice,id) {
            let valor = document.getElementById(id).value;

            if (id == "dn") {
                let dn = document.getElementById(id).value.split("-");
                valor = dn[2]+"/"+dn[1]+"/"+dn[0];
            }

            let membros = "";

            listaNIS.forEach(function (item){
                if (item[indice].includes(valor)) {
                    membros += `
                    <tr>
                      <td>${item[0]}</td>
                      <td>${item[1]}</td>
                      <td>${item[2]}</td>
                      <td>${item[indice]}</td>
                      <td colspan=3><a href="#" onclick="acompanhar('${item[0]}'); return false;">Listar membros<br>dessa família</a></td>
                    <tr>
                    `;
                }
            });

            document.getElementById("dados_familia").innerHTML = `
              <tr>
                <th>ID Família</th>
                <th>NIS</th>
                <th>Nome</th>
                <th></th>
              <tr>
              ${membros}
            `;

            document.getElementById("cancelar").classList = "";
        }

        function acompanhar(_familia) {
            let familia = _familia || nis2familia[document.getElementById("nis").value];

            if (familia == "") {
                alert("Informe o NIS antes!");
                return;
            }

            if (!familia) {
                alert("NIS não encontrado no sistema");
                return;
            }

            let membros = "";

            listaNIS.forEach(function (item){
                if (item[0] == familia) {
                    membros += `
                    <tr id=${item[1]}>
                      <td>${item[1]}</td>
                      <td>${item[2]}</td>
                      <td>${item[3]}</td>
                      <td colspan=3><a href="#" onclick="iniciarAcompanhamento('${item[1]}'); return false;">Acompanhar</a></td>
                    <tr>
                    `;
                }
            });

            document.getElementById("dados_familia").innerHTML = `
              <tr>
                <th>NIS</th>
                <th>Nome</th>
                <th>Data<br>nascimento</th>
                <th>Peso</th>
                <th>Altura</th>
                <th>Data<br>acompanhamento</th>
              <tr>
              ${membros}
            `;

            document.getElementById("cancelar").classList = "";
            document.getElementById("salvar").classList = "";
        }
    </script></html>
