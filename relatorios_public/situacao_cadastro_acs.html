function sortByThirdProperty(data) {
  // Convert the input object into an array of key-value pairs
  const dataArray = Object.entries(data);

  // Sort the array based on the third property (index 2 of each value)
  dataArray.sort((a, b) => {
    const aValue = parseInt(a[1][2]);
    const bValue = parseInt(b[1][2]);

    if (aValue < bValue) {
      return -1;
    } else if (aValue > bValue) {
      return 1;
    } else {
      return 0;
    }
  });

  // Create an array of objects from the sorted key-value pairs
  const sortedArray = dataArray.map(([key, value]) => ({
    id: key,
    name: value[0],
    category: value[1],
    property3: value[2],
  }));

  return sortedArray;
}
