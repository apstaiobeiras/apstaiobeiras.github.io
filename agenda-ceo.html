        <script>
            function geraTabela() {
                const meses = [];
            meses[1] = 'Janeiro';
            meses[2] = 'Fevereiro';
            meses[3] = 'Março';
            meses[4] = 'Abril';
            meses[5] = 'Maio';
            meses[6] = 'Junho';
            meses[7] = 'Julho';
            meses[8] = 'Agosto';
            meses[9] = 'Setembro';
            meses[10] = 'Outubro';
            meses[11] = 'Novembro';
            meses[12] = 'Dezembro';

            for (let mes in agendaCEO) {
                let linhaMes = document.createElement("tr");
                    linhaMes.innerHTML = `<td colspan="7" align=center><b>${meses[mes]}</b></td>`;
                    linhaMes.classList=mes;

                document.getElementById("lista").appendChild(linhaMes);

                for (let solicitante in agendaCEO[mes]) {
                    let linhaSolicitante = document.createElement("tr");
                    linhaSolicitante.classList=mes;
                    linhaSolicitante.innerHTML = `<td>${solicitante}</td>`;

                    document.getElementById("lista").appendChild(linhaSolicitante);
                    let adicionadoSituacao = false;

                    let cboTotal = 0;
                    for (let cbo in agendaCEO[mes][solicitante]){
                        let linhaCBO = document.createElement("tr");
                        linhaCBO.innerHTML = `<td>${cbo}</td>`;
                        linhaCBO.classList=`mes ${solicitante.replaceAll(" ","-")}`;
                        
                        document.getElementById("lista").appendChild(linhaCBO);
                        for (let situacao in agendaCEO[mes][solicitante][cbo]) {
                            linhaCBO.innerHTML += `<td align="right">${agendaCEO[mes][solicitante][cbo][situacao]}</td>`;
                            console.log(situacao);
                            if (situacao == "Agendados") continue;
                            agendaCEO[mes][solicitante][cbo].Agendados += agendaCEO[mes][solicitante][cbo][situacao];

                            agendaCEO[mes][solicitante]["<b>Total</b>"][situacao] += agendaCEO[mes][solicitante][cbo][situacao];
                        }
                        linhaCBO.children[1].innerHTML = agendaCEO[mes][solicitante][cbo].Agendados;

                        if (adicionadoSituacao) continue;
                        for (let situacao in agendaCEO[mes][solicitante][cbo]) {
                            linhaSolicitante.innerHTML += `<td>${situacao}</td>`;
                            adicionadoSituacao = true;
                        }
                    }
                }
